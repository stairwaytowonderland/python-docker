          command: cves,recommendations
          image: ${{ steps.meta.outputs.build_tag }}
          only-severities: critical,high
          exit-code: true
          # to: ${{ env.DOCKER_REGISTRY }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.build_tag }}
