            type=gha,scope=build-cache-${{ steps.meta.outputs.image_name }}-${{ steps.meta.outputs.build_tag }},mode=max
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0},mode=max', steps.meta.outputs.cache_image_name) || '' }}
          annotations: |
            index:org.opencontainers.image.description=${{ steps.meta.outputs.image_desc }}
            index:org.opencontainers.image.title=${{ steps.meta.outputs.image_title }}
            index:org.opencontainers.image.source=${{ steps.meta.outputs.repo_source }}
            index:org.opencontainers.image.version=${{ steps.meta.outputs.image_version }}
            index:org.opencontainers.image.revision=${{ env.SHA }}
            index:org.opencontainers.image.vendor=${{ secrets.DOCKER_USER }}
            index:org.opencontainers.image.base.name=ubuntu
            index:org.opencontainers.image.base.variant=latest
            index:org.opencontainers.image.licenses=MIT

