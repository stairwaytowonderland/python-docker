name: Build and Publish Docker Images

on:
  # Trigger on pushes to main branch when Docker-related files change
  push:
    branches: [main]
    paths:
      - 'docker/helpers/**'
      - 'docker/lib-scripts/**'
      - 'docker/utils/**'
      - 'docker/Dockerfile'
  # Manual trigger
  workflow_dispatch:
  # Run daily at 2:00 AM UTC to build latest/nightly images and ensure they stay up to date with recent changes
  # NOTE: GitHub Actions scheduled workflows always run on UTC time
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_NAME: cpython
  REPO_NAMESPACE: stairwaytowonderland
  DEFAULT_TARGET: base
  PLATFORM: linux/arm64,linux/amd64

jobs:
  build:
    name: '${{ matrix.tag_prefix }} (${{ matrix.base_image_name }}:${{ matrix.base_image_variant }})'
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && (format('refs/heads/{0}', github.event.repository.default_branch) == github.ref || startsWith(github.ref, 'refs/tags/')))
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # ──── debian:bookworm-slim ────
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.10', tag_prefix: '3.10' }
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.11', tag_prefix: '3.11' }
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.12', tag_prefix: '3.12' }
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: '3.12',
              tag_prefix: '3.12-perf',
              enable_optimizations: 'true',
            }
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: '3.12',
              tag_prefix: '3.12-ext',
              python_dev: 'true',
              enable_bolt: 'false',
            }
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.13', tag_prefix: '3.13' }
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.14', tag_prefix: '3.14' }
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: '3.14',
              tag_prefix: '3.14-perf',
              enable_optimizations: 'true',
            }
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: '3.14',
              tag_prefix: '3.14-ext',
              python_dev: 'true',
              enable_bolt: 'false',
            }

          # ---- latest/current (debian:bookworm-slim) ----
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: 'latest',
              tag_prefix: 'unstable',
              unstable: 'true',
            }
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: 'current',
              tag_prefix: 'latest',
              latest: 'false',
            }

          # ──── ubuntu:latest ────
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.10', tag_prefix: '3.10' }
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.11', tag_prefix: '3.11' }
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.12', tag_prefix: '3.12' }
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: '3.12',
              tag_prefix: '3.12-perf',
              enable_optimizations: 'true',
            }
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: '3.12',
              tag_prefix: '3.12-ext',
              python_dev: 'true',
              enable_bolt: 'false',
            }
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.13', tag_prefix: '3.13' }
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.14', tag_prefix: '3.14' }
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: '3.14',
              tag_prefix: '3.14-perf',
              enable_optimizations: 'true',
            }
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: '3.14',
              tag_prefix: '3.14-ext',
              python_dev: 'true',
              enable_bolt: 'false',
            }

          # ---- latest/current (ubuntu:latest) ----
          # Note: 'latest' tag is built in a separate job after all matrix builds complete to ensure it's the last one built
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: 'latest',
              tag_prefix: 'unstable',
              unstable: 'true',
            }
          # Note: 'latest' tag is built in a subsequent job to ensure it's the last one built
          # - {
          #     base_image_name: ubuntu,
          #     base_image_variant: latest,
          #     python_version: 'current',
          #     tag_prefix: 'latest',
          #     latest: 'true',
          #   }

          # ──── dhi:bookworm-debian12-dev ────
          # NOTE: DHI base image is pulled from dhi.io during the build.
          #       If dhi.io requires authentication, add a docker/login-action
          #       step for it using DHI_REGISTRY_PAT / DHI_REGISTRY_USER secrets.
          - {
              base_image_name: dhi,
              base_image_variant: bookworm-debian12-dev,
              python_version: '3.12',
              tag_prefix: '3.12',
            }
          - {
              base_image_name: dhi,
              base_image_variant: bookworm-debian12-dev,
              python_version: '3.14',
              tag_prefix: '3.14',
            }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.REPO_NAMESPACE }}
          password: ${{ secrets.CR_PAT }}

      - name: Compute image tags and build args
        id: meta
        uses: ./.github/actions/docker-setup
        with:
          repo_name: ${{ env.REPO_NAME }}
          repo_namespace: ${{ env.REPO_NAMESPACE }}
          base_image_name: ${{ matrix.base_image_name }}
          base_image_variant: ${{ matrix.base_image_variant }}
          tag_prefix: ${{ matrix.tag_prefix }}
          python_version: ${{ matrix.python_version }}
          unstable: ${{ matrix.unstable }}
          enable_optimizations: ${{ matrix.enable_optimizations }}
          python_dev: ${{ matrix.python_dev }}
          enable_bolt: ${{ matrix.enable_bolt }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          target: ${{ env.DEFAULT_TARGET }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: ${{ steps.meta.outputs.build_args }}
          provenance: mode=max
          sbom: true
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_ref }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max
          annotations: |
            index:org.opencontainers.image.description=${{ steps.meta.outputs.image_desc }}
            index:org.opencontainers.image.title=${{ steps.meta.outputs.image_title }}
            index:org.opencontainers.image.source=${{ steps.meta.outputs.repo_source }}
            index:org.opencontainers.image.version=${{ steps.meta.outputs.image_version }}
            index:org.opencontainers.image.revision=${{ github.sha }}
            index:org.opencontainers.image.vendor=${{ env.REPO_NAMESPACE }}
            index:org.opencontainers.image.base.name=${{ matrix.base_image_name }}
            index:org.opencontainers.image.base.variant=${{ matrix.base_image_variant }}
            index:org.opencontainers.image.licenses=MIT

  # Runs after all matrix builds complete to ensure 'latest' reflects a fully successful run
  build-latest:
    name: 'latest (ubuntu:latest)'
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && (format('refs/heads/{0}', github.event.repository.default_branch) == github.ref || startsWith(github.ref, 'refs/tags/')))
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          # registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REPO_NAMESPACE }}
          password: ${{ secrets.CR_PAT }}

      - name: Compute image tags and build args
        id: meta
        uses: ./.github/actions/docker-setup
        with:
          repo_name: ${{ env.REPO_NAME }}
          repo_namespace: ${{ env.REPO_NAMESPACE }}
          base_image_name: ubuntu
          base_image_variant: latest
          tag_prefix: latest
          python_version: current
          # python_version: latest
          latest: 'true'

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          target: ${{ env.DEFAULT_TARGET }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: ${{ steps.meta.outputs.build_args }}
          provenance: mode=max
          sbom: true
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_ref }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max
          annotations: |
            index:org.opencontainers.image.description=${{ steps.meta.outputs.image_desc }}
            index:org.opencontainers.image.title=${{ steps.meta.outputs.image_title }}
            index:org.opencontainers.image.source=${{ steps.meta.outputs.repo_source }}
            index:org.opencontainers.image.version=${{ steps.meta.outputs.image_version }}
            index:org.opencontainers.image.revision=${{ github.sha }}
            index:org.opencontainers.image.vendor=${{ env.REPO_NAMESPACE }}
            index:org.opencontainers.image.base.name=ubuntu
            index:org.opencontainers.image.base.variant=latest
            index:org.opencontainers.image.licenses=MIT
