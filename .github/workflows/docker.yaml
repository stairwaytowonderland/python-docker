name: Build and Publish Docker Images

on:
  # Trigger on pushes to main branch when Docker-related files change
  push:
    branches: [main]
    paths:
      - 'docker/helpers/**'
      - 'docker/lib-scripts/**'
      - 'docker/utils/**'
      - 'docker/Dockerfile'
  pull_request:
    branches: [main]
    # paths:
    #   - 'docker/helpers/**'
    #   - 'docker/lib-scripts/**'
    #   - 'docker/utils/**'
    #   - 'docker/Dockerfile'
  # Manual trigger
  workflow_dispatch:
  # Run daily at 2:00 AM UTC to build latest/nightly images and ensure they stay up to date with recent changes
  # NOTE: GitHub Actions scheduled workflows always run on UTC time
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: docker.io
  DEFAULT_TARGET: base
  DEFAULT_PLATFORM: linux/amd64
  PLATFORM: linux/arm64,linux/amd64
  SHA: ${{ github.event.pull_request.head.sha || github.event.after }}

jobs:
  configure:
    name: Normalize environment variables
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.setup.outputs.platform }}
      repo_name: ${{ steps.setup.outputs.repo_name }}
      registry: ${{ steps.setup.outputs.registry }}
      sha: ${{ steps.setup.outputs.sha }}
    steps:
      - name: Setup
        id: setup
        shell: bash
        run: |
          set -u

          # Normalize platform list for buildx (e.g. "linux/amd64,linux/arm64")
          PLATFORMS="${PLATFORM:-$DEFAULT_PLATFORM}"
          PLATFORMS="${PLATFORM// /}"  # Remove whitespace
          echo "platform=${PLATFORMS}" >> "$GITHUB_OUTPUT"
          echo "PLATFORM=${PLATFORMS}" >> "$GITHUB_ENV"

          # Extract repository name from REPO_NAME (e.g. "cpython" from "user/cpython")
          GITHUB_REPO="${{ github.repository }}"
          # REPO_NAME="${GITHUB_REPO#${{ github.repository_owner }}/}"
          REPO_NAME="${GITHUB_REPO##*/}"
          echo "repo_name=${REPO_NAME}" >> "$GITHUB_OUTPUT"
          echo "REPO_NAME=${REPO_NAME}" >> "$GITHUB_ENV"

          echo "registry=${DOCKER_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "REGISTRY=${DOCKER_REGISTRY}" >> "$GITHUB_ENV"

          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "COMMIT_SHA=${SHA}" >> "$GITHUB_ENV"
      - name: Log environment
        shell: bash
        run: |
          echo "DOCKER_REGISTRY=${DOCKER_REGISTRY}"
          echo "DEFAULT_TARGET=${DEFAULT_TARGET}"
          echo "PLATFORM=${PLATFORM}"
          echo "SHA=${SHA}"
          echo "REPO_NAME=${REPO_NAME}"
  build:
    name: '${{ matrix.tag_prefix }} (${{ matrix.base_image_name }}:${{ matrix.base_image_variant }})'
    runs-on: ubuntu-latest
    needs: [configure]
    if: github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && (format('refs/heads/{0}', github.event.repository.default_branch) == github.ref || startsWith(github.ref, 'refs/tags/')))
    permissions:
      contents: read
      packages: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ──── debian:bookworm-slim ────
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.10', tag_prefix: '3.10' }
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.11', tag_prefix: '3.11' }
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.12', tag_prefix: '3.12' }
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: '3.12',
              tag_prefix: '3.12-perf',
              enable_optimizations: 'true',
            }
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: '3.12',
              tag_prefix: '3.12-ext',
              python_dev: 'true',
              enable_bolt: 'false',
            }
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.13', tag_prefix: '3.13' }
          - { base_image_name: debian, base_image_variant: bookworm-slim, python_version: '3.14', tag_prefix: '3.14' }
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: '3.14',
              tag_prefix: '3.14-perf',
              enable_optimizations: 'true',
            }
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: '3.14',
              tag_prefix: '3.14-ext',
              python_dev: 'true',
              enable_bolt: 'false',
            }

          # ---- latest/current (debian:bookworm-slim) ----
          - {
              base_image_name: debian,
              base_image_variant: bookworm-slim,
              python_version: 'latest',
              tag_prefix: 'unstable',
              unstable: 'true',
            }
          # - {
          #     base_image_name: debian,
          #     base_image_variant: bookworm-slim,
          #     python_version: 'current',
          #     tag_prefix: 'latest',
          #     latest: 'false',
          #   }

          # ──── ubuntu:latest ────
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.10', tag_prefix: '3.10' }
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.11', tag_prefix: '3.11' }
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.12', tag_prefix: '3.12' }
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: '3.12',
              tag_prefix: '3.12-perf',
              enable_optimizations: 'true',
            }
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: '3.12',
              tag_prefix: '3.12-ext',
              python_dev: 'true',
              enable_bolt: 'false',
            }
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.13', tag_prefix: '3.13' }
          - { base_image_name: ubuntu, base_image_variant: latest, python_version: '3.14', tag_prefix: '3.14' }
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: '3.14',
              tag_prefix: '3.14-perf',
              enable_optimizations: 'true',
            }
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: '3.14',
              tag_prefix: '3.14-ext',
              python_dev: 'true',
              enable_bolt: 'false',
            }

          # ---- latest/current (ubuntu:latest) ----
          - {
              base_image_name: ubuntu,
              base_image_variant: latest,
              python_version: 'latest',
              tag_prefix: 'unstable',
              unstable: 'true',
            }
          # - {
          #     base_image_name: ubuntu,
          #     base_image_variant: latest,
          #     python_version: 'current',
          #     tag_prefix: 'latest',
          #     latest: 'true',
          #   }

          # ──── dhi:bookworm-debian12-dev ────
          # NOTE: DHI base image is pulled from dhi.io during the build.
          #       If dhi.io requires authentication, add a docker/login-action
          #       step for it using DHI_REGISTRY_PAT / DHI_REGISTRY_USER secrets.
          - {
              base_image_name: dhi,
              base_image_variant: bookworm-debian12-dev,
              python_version: '3.12',
              tag_prefix: '3.12',
            }
          - {
              base_image_name: dhi,
              base_image_variant: bookworm-debian12-dev,
              python_version: '3.14',
              tag_prefix: '3.14',
            }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Registry ${{ env.DOCKER_REGISTRY }}
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Compute image tags and build args
        id: meta
        uses: ./.github/actions/docker-setup
        with:
          repo_name: ${{ needs.configure.outputs.repo_name }}
          repo_namespace: ${{ secrets.DOCKER_USER }}
          base_image_name: ${{ matrix.base_image_name }}
          base_image_variant: ${{ matrix.base_image_variant }}
          tag_prefix: ${{ matrix.tag_prefix }}
          python_version: ${{ matrix.python_version }}
          unstable: ${{ matrix.unstable }}
          enable_optimizations: ${{ matrix.enable_optimizations }}
          python_dev: ${{ matrix.python_dev }}
          enable_bolt: ${{ matrix.enable_bolt }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      # - name: Extract Docker metadata
      #   id: metadata
      #   uses: docker/metadata-action@v4.4.0
      #   if: github.event_name != 'pull_request'
      #   with:
      #     images: ${{ env.DOCKER_REGISTRY }}/${{ steps.meta.outputs.image_name }}
      #     # labels: |
      #     #   org.opencontainers.image.revision=${{ env.SHA }}
      #     tags: |
      #       type=edge,branch=$repo.default_branch
      #       type=semver,pattern=v{{version}}
      #       type=sha,prefix=,suffix=,format=long

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: ${{ github.event_name != 'pull_request' }}
          target: ${{ env.DEFAULT_TARGET }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: ${{ steps.meta.outputs.build_args }}
          provenance: mode=max
          sbom: true
          cache-from: |
            type=gha,scope=build-cache-${{ steps.meta.outputs.image_name }}-${{ steps.meta.outputs.build_tag }}
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}', steps.meta.outputs.cache_image_name) || '' }}
          cache-to: |
            type=gha,scope=build-cache-${{ steps.meta.outputs.image_name }}-${{ steps.meta.outputs.build_tag }},mode=max
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0},mode=max', steps.meta.outputs.cache_image_name) || '' }}
          annotations: |
            index:org.opencontainers.image.description=${{ steps.meta.outputs.image_desc }}
            index:org.opencontainers.image.title=${{ steps.meta.outputs.image_title }}
            index:org.opencontainers.image.source=${{ steps.meta.outputs.repo_source }}
            index:org.opencontainers.image.version=${{ steps.meta.outputs.image_version }}
            index:org.opencontainers.image.revision=${{ env.SHA }}
            index:org.opencontainers.image.vendor=${{ secrets.DOCKER_USER }}
            index:org.opencontainers.image.base.name=${{ matrix.base_image_name }}
            index:org.opencontainers.image.base.variant=${{ matrix.base_image_variant }}
            index:org.opencontainers.image.licenses=MIT

      - name: Docker Scout
        id: docker-scout
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1.20.4
        with:
          command: cves,recommendations
          image: ${{ steps.meta.outputs.build_tag }}
          only-severities: critical,high
          exit-code: true
          ignore-base: true
          # ignore-unchanged: true
          only-fixed: true
          # to: ${{ env.DOCKER_REGISTRY }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.build_tag }}

  build-latest-debian:
    name: 'latest (debian:bookworm-slim)'
    needs: [configure, build]
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && (format('refs/heads/{0}', github.event.repository.default_branch) == github.ref || startsWith(github.ref, 'refs/tags/')))
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Registry ${{ env.DOCKER_REGISTRY }}
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Compute image tags and build args
        id: meta
        uses: ./.github/actions/docker-setup
        with:
          repo_name: ${{ needs.configure.outputs.repo_name }}
          repo_namespace: ${{ secrets.DOCKER_USER }}
          base_image_name: debian
          base_image_variant: bookworm-slim
          tag_prefix: latest
          python_version: current
          # python_version: latest
          latest: 'true'

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      # - name: Extract Docker metadata
      #   id: metadata
      #   uses: docker/metadata-action@v4.4.0
      #   if: github.event_name != 'pull_request'
      #   with:
      #     images: ${{ env.DOCKER_REGISTRY }}/${{ steps.meta.outputs.image_name }}
      #     # labels: |
      #     #   org.opencontainers.image.revision=${{ env.SHA }}
      #     tags: |
      #       type=edge,branch=$repo.default_branch
      #       type=semver,pattern=v{{version}}
      #       type=sha,prefix=,suffix=,format=long

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: ${{ github.event_name != 'pull_request' }}
          target: ${{ env.DEFAULT_TARGET }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: ${{ steps.meta.outputs.build_args }}
          provenance: mode=max
          sbom: true
          cache-from: |
            type=gha,scope=build-cache-${{ steps.meta.outputs.image_name }}-${{ steps.meta.outputs.build_tag }}
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}', steps.meta.outputs.cache_image_name) || '' }}
          cache-to: |
            type=gha,scope=build-cache-${{ steps.meta.outputs.image_name }}-${{ steps.meta.outputs.build_tag }},mode=max
            ${{ github.event_name != 'pull_request' && format('type=registry,ref={0},mode=max', steps.meta.outputs.cache_image_name) || '' }}
          annotations: |
            index:org.opencontainers.image.description=${{ steps.meta.outputs.image_desc }}
            index:org.opencontainers.image.title=${{ steps.meta.outputs.image_title }}
            index:org.opencontainers.image.source=${{ steps.meta.outputs.repo_source }}
            index:org.opencontainers.image.version=${{ steps.meta.outputs.image_version }}
            index:org.opencontainers.image.revision=${{ env.SHA }}
            index:org.opencontainers.image.vendor=${{ secrets.DOCKER_USER }}
            index:org.opencontainers.image.base.name=debian
            index:org.opencontainers.image.base.variant=bookworm-slim
            index:org.opencontainers.image.licenses=MIT

      - name: Docker Scout
        id: docker-scout
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1.20.4
        with:
          command: cves,recommendations
          image: ${{ steps.meta.outputs.build_tag }}
          only-severities: critical,high
          exit-code: true
          # to: ${{ env.DOCKER_REGISTRY }}/${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.build_tag }}

  build-latest-ubuntu:
    name: 'latest (ubuntu:latest)'
    needs: [configure, build-latest-debian]
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && (format('refs/heads/{0}', github.event.repository.default_branch) == github.ref || startsWith(github.ref, 'refs/tags/')))
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Registry ${{ env.DOCKER_REGISTRY }}
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Compute image tags and build args
        id: meta
        uses: ./.github/actions/docker-setup
        with:
          repo_name: ${{ needs.configure.outputs.repo_name }}
          repo_namespace: ${{ secrets.DOCKER_USER }}
          base_image_name: ubuntu
          base_image_variant: latest
          tag_prefix: latest
          python_version: current
          # python_version: latest
          latest: 'true'

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      # - name: Extract Docker metadata
      #   id: metadata
      #   uses: docker/metadata-action@v4.4.0
      #   if: github.event_name != 'pull_request'
      #   with:
      #     images: ${{ env.DOCKER_REGISTRY }}/${{ steps.meta.outputs.image_name }}
      #     # labels: |
      #     #   org.opencontainers.image.revision=${{ env.SHA }}
      #     tags: |
      #       type=edge,branch=$repo.default_branch
      #       type=semver,pattern=v{{version}}
      #       type=sha,prefix=,suffix=,format=long

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: ${{ github.event_name != 'pull_request' }}
          target: ${{ env.DEFAULT_TARGET }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: ${{ steps.meta.outputs.build_args }}
          provenance: mode=max
          sbom: true
          cache-from: |
            type=gha,scope=build-cache-${{ steps.meta.outputs.image_name }}-${{ steps.meta.outputs.build_tag }}
